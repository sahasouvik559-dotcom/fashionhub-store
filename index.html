    <meta charset="UTF-8">

    <!-- External Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  
<style>
    :root { --primary: #064e3b; --gold: #d4af37; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fafaf9; scroll-behavior: smooth; }
    .font-serif { font-family: 'Playfair Display', serif; }
      
    .hero-bg {
        background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
        url('https://images.unsplash.com/photo-1441984904996-e0b6ba687e04?q=60&w=1200&auto=format&fit=crop');
        background-size: cover; background-position: center;
    }

    .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
      
    @keyframes findProduct {
        0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(6, 78, 59, 0.7); border: 4px solid #064e3b; }
        30% { transform: scale(1.1); box-shadow: 0 0 70px 30px rgba(212, 175, 55, 0.4); border: 4px solid #d4af37; }
        100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(6, 78, 59, 0); border: 1px solid #e5e7eb; }
    }
    .focused-product { 
        animation: findProduct 2.5s ease-in-out 2; 
        z-index: 40; 
        scroll-margin-top: 150px; 
        position: relative;
    }

    .found-label {
        position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
        background: #d4af37; color: white; padding: 4px 12px; border-radius: 20px;
        font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 50; animation: bounce 1s infinite;
    }

    @keyframes bounce { 0%, 100% { transform: translate(-50%, 0); } 50% { transform: translate(-50%, -5px); } }

    .modal { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); visibility: hidden; opacity: 0; transform: translateY(20px); position: fixed; inset: 0; z-index: 100; }
    .modal.active { visibility: visible; opacity: 1; transform: translateY(0); }

    #imageLightbox.active { visibility: visible; opacity: 1; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .skeleton { background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
    @keyframes shimmer { 100% { background-position: -200% 0; } }
</style>
</head>

<body class="antialiased">

<!-- Toast Notification -->

<!-- Image Preview Lightbox -->

</nav>

<!-- Hero Section -->

</div>

<!-- Features -->
<div class="max-w-7xl mx-auto px-6 mt-12 grid grid-cols-1 md:grid-cols-3 gap-6">
    <div class="bg-white p-6 rounded-[2rem] border border-stone-100 flex flex-col items-center text-center shadow-sm">
        <div class="w-12 h-12 bg-emerald-50 rounded-full flex items-center justify-center text-2xl mb-4">🛍️</div>
        <h3 class="text-sm font-bold text-emerald-950">সাশ্রয়ী দামে প্রোডাক্ট।</h3>
        <p class="text-[10px] text-stone-500 uppercase tracking-widest">Premium & Affordable</p>
    </div>
    <div class="bg-white p-6 rounded-[2rem] border border-stone-100 flex flex-col items-center text-center shadow-sm">
        <div class="w-12 h-12 bg-emerald-50 rounded-full flex items-center justify-center text-2xl mb-4">💳</div>
        <h3 class="text-sm font-bold text-emerald-950">ক্যাশ অন ডেলিভারি।</h3>
        <p class="text-[10px] text-stone-500 uppercase tracking-widest">COD Available</p>
    </div>
    <div class="bg-white p-6 rounded-[2rem] border border-stone-100 flex flex-col items-center text-center shadow-sm">
        <div class="w-12 h-12 bg-emerald-50 rounded-full flex items-center justify-center text-2xl mb-4">🔄</div>
        <h3 class="text-sm font-bold text-emerald-950">সহজ প্রোডাক্ট এক্সচেঞ্জ।</h3>
        <p class="text-[10px] text-stone-500 uppercase tracking-widest">Hassle-Free Exchange</p>

</div>

<!-- ADS SECTION START -->
<div class="max-w-7xl mx-auto px-6 mt-12 flex flex-col md:flex-row items-center justify-center gap-8">
    <!-- Ad Code 1 -->
    <div class="w-full flex justify-center bg-stone-50 rounded-3xl p-4 overflow-hidden border border-stone-100">
        <script async="async" data-cfasync="false" src="https://eliminatedfertilizer.com/2da14969d3a54865dc829ebf15bfd520/invoke.js"></script>

<!-- Shop Section -->
<div id="shop" class="max-w-7xl mx-auto pt-12 px-6 pb-20">
    <div class="flex flex-col items-center mb-10">
        <h2 class="text-2xl font-bold font-serif text-emerald-950 mb-6 uppercase tracking-widest">Categories</h2>
        <div class="flex gap-2 bg-stone-100 p-1.5 rounded-2xl border border-stone-200 overflow-x-auto no-scrollbar w-full max-w-3xl">
            <button onclick="window.filterProducts('all')" id="btn-all" class="cat-btn whitespace-nowrap px-8 py-3.5 rounded-xl text-[10px] font-bold uppercase tracking-widest transition-all bg-emerald-950 text-white shadow-md">All Items</button>
            <button onclick="window.filterProducts('men')" id="btn-men" class="cat-btn whitespace-nowrap px-8 py-3.5 rounded-xl text-[10px] font-bold uppercase tracking-widest transition-all text-stone-500">Men</button>
            <button onclick="window.filterProducts('women')" id="btn-women" class="cat-btn whitespace-nowrap px-8 py-3.5 rounded-xl text-[10px] font-bold uppercase tracking-widest transition-all text-stone-500">Women</button>
            <button onclick="window.filterProducts('electronics')" id="btn-electronics" class="cat-btn whitespace-nowrap px-8 py-3.5 rounded-xl text-[10px] font-bold uppercase tracking-widest transition-all text-stone-500">Electronics</button>
        </div>
    </div>

    <div id="loading" class="grid grid-cols-2 md:grid-cols-4 gap-6">
        <div class="h-80 skeleton rounded-[2.5rem]"></div>
        <div class="h-80 skeleton rounded-[2.5rem]"></div>
    </div>
      
    <div id="productGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 md:gap-10"></div>
</div>

<!-- Order Modal -->
<div id="orderModal" class="modal bg-emerald-950/20 backdrop-blur-md flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-lg rounded-[3rem] overflow-hidden relative shadow-2xl max-h-[90vh] overflow-y-auto">
        <div class="p-8 md:p-10">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-bold text-2xl font-serif text-emerald-950">Order Now</h3>
                <button onclick="window.closeModal()" class="w-10 h-10 bg-stone-50 text-stone-400 rounded-full flex items-center justify-center"><i class="fas fa-times"></i></button>
            </div>
              
            <div class="flex gap-4 mb-6 bg-stone-50 p-4 rounded-3xl border border-stone-100">
                <img id="modalImg" src="" class="w-20 h-20 object-cover rounded-2xl shadow-md">
                <div>
                    <h4 id="modalPName" class="font-bold text-emerald-950 text-sm"></h4>
                    <p id="modalPPrice" class="text-emerald-600 font-bold text-xl mt-1"></p>
                </div>
            </div>

            <form id="orderForm" onsubmit="window.submitOrder(event)" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <select id="cusSize" class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-3.5 text-xs">
                        <option value="Standard">Standard Size</option>
                        <option value="S">S</option><option value="M">M</option><option value="L">L</option><option value="XL">XL</option><option value="XXL">XXL</option>
                    </select>
                    <input type="text" id="cusColor" placeholder="Color" class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-3.5 text-xs">
                </div>
                <input type="text" id="cusName" required placeholder="আপনার নাম" class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-4 text-xs">
                <input type="tel" id="cusPhone" required placeholder="মোবাইল নম্বর" class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-4 text-xs">
                <textarea id="cusAddress" required placeholder="পূর্ণ ঠিকানা" class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-4 text-xs min-h-[80px]"></textarea>
                <button type="submit" class="w-full bg-emerald-950 text-white font-bold py-5 rounded-xl text-[10px] uppercase tracking-widest shadow-xl">Confirm on WhatsApp</button>
            </form>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAkLS6VAGLk0z5K5LaHBlUWKf8HRmRZ3jc",
        authDomain: "souvik-saha.firebaseapp.com",
        databaseURL: "https://souvik-saha-default-rtdb.firebaseio.com",
        projectId: "souvik-saha",
        storageBucket: "souvik-saha.firebasestorage.app",
        messagingSenderId: "883171907186",
        appId: "1:883171907186:web:dda3ce4ced5ba6a37d54eb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    window.allProducts = [];
    window.currentP = null;

    onValue(ref(db, 'products'), (snap) => {
        const data = snap.val();
        const loading = document.getElementById('loading');
        if (data) {
            window.allProducts = Object.keys(data).map(key => ({ id: key, ...data[key] })).reverse();
            window.renderProducts('all');
            if(loading) loading.style.display = 'none';

            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');
            if (productId) {
                setTimeout(() => {
                    const target = document.getElementById('prod-' + productId);
                    if (target) {
                        target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        target.classList.add('focused-product');
                        const label = document.createElement('div');
                        label.className = 'found-label';
                        label.innerHTML = 'আপনার প্রোডাক্ট <i class="fas fa-arrow-down ml-1"></i>';
                        target.appendChild(label);
                    }
                }, 1000);
            }
        } else {
            document.getElementById('productGrid').innerHTML = "<p class='col-span-full text-center py-10'>কোন প্রোডাক্ট পাওয়া যায়নি।</p>";
            if(loading) loading.style.display = 'none';
        }
    });

    window.renderProducts = (cat) => {
        const grid = document.getElementById('productGrid');
        let html = '';
        const filtered = window.allProducts.filter(p => cat === 'all' || (p.category && p.category.toLowerCase() === cat.toLowerCase()));

        filtered.forEach(p => {
            const isOut = p.status === 'out';
            html += `
                <div id="prod-${p.id}" class="bg-white rounded-[2rem] border border-stone-100 overflow-hidden flex flex-col relative group hover:shadow-2xl transition-all duration-500">
                    <button onclick="window.copyProductLink('${p.id}')" class="absolute top-4 right-4 z-10 w-8 h-8 bg-white/90 backdrop-blur rounded-full flex items-center justify-center text-emerald-950 shadow-md">
                        <i class="fas fa-link text-[10px]"></i>
                    </button>
                    <div class="relative aspect-[4/5] overflow-hidden cursor-zoom-in" onclick="window.previewImage('${p.image}')">
                        ${isOut ? `<div class="absolute inset-0 z-10 bg-emerald-950/40 backdrop-blur-sm flex items-center justify-center text-white text-[10px] font-bold uppercase tracking-widest">Out of Stock</div>` : ''}
                        <img src="${p.image}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700 ${isOut ? 'grayscale' : ''}">
                    </div>
                    <div class="p-5 flex flex-col flex-grow">
                        <h4 class="font-bold text-emerald-950 text-sm mb-3 leading-snug">${p.name}</h4>
                        <div class="mt-auto flex justify-between items-center">
                            <span class="text-emerald-950 font-bold text-lg">₹${p.price}</span>
                            <button ${isOut ? 'disabled' : `onclick="window.openModal('${p.id}')"`} class="w-10 h-10 rounded-xl ${isOut ? 'bg-stone-100' : 'bg-emerald-950 text-white shadow-lg'} flex items-center justify-center">
                                <i class="fas fa-shopping-bag text-[10px]"></i>
                            </button>
                        </div>
                    </div>
                </div>`;
        });
        grid.innerHTML = html;
    };

    window.filterProducts = (cat) => {
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.classList.remove('bg-emerald-950', 'text-white', 'shadow-md');
            btn.classList.add('text-stone-500');
        });
        const activeBtn = document.getElementById('btn-' + cat);
        if(activeBtn) {
            activeBtn.classList.add('bg-emerald-950', 'text-white', 'shadow-md');
            activeBtn.classList.remove('text-stone-500');
        }
        window.renderProducts(cat);
    };

    window.copyProductLink = (id) => {
        const url = window.location.origin + window.location.pathname + '?id=' + id;
        navigator.clipboard.writeText(url).then(() => window.showToast("Link Copied!"));
    };

    window.showToast = (msg) => {
        const t = document.getElementById('toast');
        document.getElementById('toastMsg').innerText = msg;
        t.style.opacity = '1';
        setTimeout(() => t.style.opacity = '0', 2500);
    };

    window.previewImage = (url) => {
        document.getElementById('lightboxImg').src = url;
        document.getElementById('imageLightbox').classList.add('active');
    };

    window.openModal = (id) => {
        const p = window.allProducts.find(x => x.id === id);
        window.currentP = p;
        document.getElementById('modalPName').innerText = p.name;
        document.getElementById('modalPPrice').innerText = `₹${p.price}`;
        document.getElementById('modalImg').src = p.image;
        document.getElementById('orderModal').classList.add('active');
        document.body.style.overflow = 'hidden';
    };

    window.closeModal = () => {
        document.getElementById('orderModal').classList.remove('active');
        document.body.style.overflow = 'auto';
    };

    window.submitOrder = (e) => {
        e.preventDefault();
        const p = window.currentP;
        const name = document.getElementById('cusName').value;
        const phone = document.getElementById('cusPhone').value;
        const address = document.getElementById('cusAddress').value;
        const size = document.getElementById('cusSize').value;
        const color = document.getElementById('cusColor').value;
        
        const pLink = window.location.origin + window.location.pathname + '?id=' + p.id;
        
        const msg = `New Order Request!%0A%0AProduct: ${p.name}%0APrice: ${p.price}%0ASize: ${size}%0AColor: ${color}%0A%0A--- Customer Details ---%0AName: ${name}%0APhone: ${phone}%0AAddress: ${address}%0A%0AProduct Link: ${pLink}`;
        
        window.open(`https://wa.me/916291767175?text=${msg}`, '_blank');
        window.closeModal();
    };
</script>

</body>
</html>
