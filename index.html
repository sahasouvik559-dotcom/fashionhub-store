<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion Hub - Premium Collection 2026</title>
    
    <!-- Tailwind & Font Awesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-serif { font-family: 'Playfair Display', serif; }
        
        .modal { transition: opacity 0.2s ease-in-out; visibility: hidden; opacity: 0; }
        .modal.active { visibility: visible; opacity: 1; }
        
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); }
        
        .skeleton { background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 100% { background-position: -200% 0; } }
        
        .out-of-stock-overlay { background: rgba(0,0,0,0.45); backdrop-filter: blur(2px); }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased">

    <!-- Navbar -->
    <nav class="glass-nav fixed w-full z-50 top-0 border-b border-gray-100 shadow-sm h-16 flex items-center">
        <div class="max-w-7xl mx-auto px-4 w-full flex justify-between items-center">
            <a href="?" class="flex items-center gap-2">
                <div class="w-9 h-9 bg-green-600 rounded-xl flex items-center justify-center text-white shadow-lg"><i class="fas fa-gem"></i></div>
                <h1 class="text-xl font-bold font-serif italic text-gray-900 leading-none">Fashion<span class="text-green-600">Hub</span></h1>
            </a>
            <a href="https://wa.me/916291767175" class="bg-gray-900 text-white px-5 py-2 rounded-full text-xs font-bold transition hover:bg-green-600 shadow-lg flex items-center gap-2">
                <i class="fab fa-whatsapp"></i> Help / সাহায্য
            </a>
        </div>
    </nav>

    <!-- Hero Section -->
    <div class="relative pt-16 h-[380px] flex items-center bg-gray-900 text-white overflow-hidden">
        <img src="https://images.unsplash.com/photo-1441998856307-57b60b406c90?q=80&w=1200&auto=format&fit=crop" class="absolute inset-0 w-full h-full object-cover opacity-50" alt="Fashion Cover">
        <div class="relative max-w-7xl mx-auto px-4">
            <!-- Updated to 2026 -->
            <span class="text-green-400 font-bold tracking-widest text-xs uppercase mb-3 block">New Collection 2026</span>
            <h1 class="text-4xl md:text-6xl font-bold font-serif mb-4 leading-tight tracking-tight">Your Unique <br><span class="text-green-500 underline decoration-green-300">Style Statement.</span></h1>
            <p class="text-gray-300 text-sm md:text-base mb-8 max-w-md">২০২৬ সালের লেটেস্ট এবং প্রিমিয়াম পোশাকের বিশাল কালেকশন।</p>
            <button onclick="document.getElementById('shop').scrollIntoView({behavior: 'smooth'})" class="bg-green-600 px-8 py-4 rounded-2xl font-bold shadow-xl shadow-green-900/30 hover:bg-green-700 transition active:scale-95">Start Shopping</button>
        </div>
    </div>

    <!-- Product Grid Section -->
    <div id="shop" class="max-w-7xl mx-auto py-12 px-4">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <h2 class="text-2xl font-bold font-serif text-gray-900 border-l-4 border-green-600 pl-4 uppercase tracking-tight">Latest Inventory</h2>
            <div class="flex gap-1 bg-gray-200/50 p-1 rounded-2xl border border-gray-200">
                <button onclick="filterProducts('all')" id="btn-all" class="cat-btn px-6 py-2.5 rounded-xl text-xs font-bold transition bg-gray-900 text-white shadow-md">All</button>
                <button onclick="filterProducts('men')" id="btn-men" class="cat-btn px-6 py-2.5 rounded-xl text-xs font-bold transition text-gray-500 hover:bg-white">Men</button>
                <button onclick="filterProducts('women')" id="btn-women" class="cat-btn px-6 py-2.5 rounded-xl text-xs font-bold transition text-gray-500 hover:bg-white">Women</button>
            </div>
        </div>

        <!-- Skeleton Loader -->
        <div id="loading" class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6">
            <div class="h-72 skeleton rounded-[2.5rem]"></div><div class="h-72 skeleton rounded-[2.5rem]"></div>
            <div class="h-72 skeleton rounded-[2.5rem] md:block hidden"></div><div class="h-72 skeleton rounded-[2.5rem] md:block hidden"></div>
        </div>
        
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-8"></div>
    </div>

    <!-- Footer -->
    <footer class="bg-gray-950 text-white pt-16 pb-8 text-center border-t border-gray-900">
        <h3 class="text-2xl font-bold font-serif mb-2 italic">Fashion<span class="text-green-500">Hub</span></h3>
        <!-- Updated to 2026 -->
        <p class="text-gray-500 text-xs uppercase tracking-widest mb-8 font-bold">The Premium Wardrobe 2026</p>
        <div class="text-gray-700 text-[10px]">&copy; 2026 Fashion Hub. Designed for Elegance.</div>
    </footer>

    <!-- ORDER MODAL -->
    <div id="orderModal" class="modal fixed inset-0 z-[60] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4 overflow-y-auto">
        <div class="bg-white w-full max-w-lg rounded-[2.5rem] overflow-hidden relative shadow-2xl border border-gray-100 my-auto">
            <div class="p-8">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-bold text-2xl font-serif italic text-gray-800">Order Product</h3>
                    <button onclick="closeModal()" class="w-10 h-10 bg-gray-50 text-gray-400 hover:text-red-500 rounded-full flex items-center justify-center transition"><i class="fas fa-times"></i></button>
                </div>

                <div class="flex gap-5 mb-8 bg-green-50/50 p-5 rounded-3xl border border-green-100">
                    <img id="modalImg" src="" class="w-20 h-20 object-cover rounded-2xl shadow-md border-2 border-white">
                    <div class="flex flex-col justify-center">
                        <h4 id="modalPName" class="font-bold text-gray-800 leading-tight text-lg"></h4>
                        <p id="modalPPrice" class="text-green-600 font-bold text-xl mt-1"></p>
                    </div>
                </div>

                <form id="orderForm" onsubmit="submitOrder(event)" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase mb-1 block ml-2">Size / সাইজ</label>
                            <select id="cusSize" class="w-full bg-gray-50 border border-gray-200 rounded-2xl px-4 py-3 text-sm outline-none focus:border-green-600 transition">
                                <option value="S">Small (S)</option>
                                <option value="M" selected>Medium (M)</option>
                                <option value="L">Large (L)</option>
                                <option value="XL">Extra Large (XL)</option>
                                <option value="XXL">XXL</option>
                                <option value="Standard">Standard</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase mb-1 block ml-2">Color / কালার</label>
                            <input type="text" id="cusColor" placeholder="Red, Black etc." class="w-full bg-gray-50 border border-gray-200 rounded-2xl px-4 py-3 text-sm outline-none focus:border-green-600 transition">
                        </div>
                    </div>

                    <input type="text" id="cusName" required placeholder="Full Name / আপনার নাম" class="w-full bg-gray-50 border border-gray-200 rounded-2xl px-4 py-3 text-sm outline-none focus:border-green-600 transition">
                    <input type="tel" id="cusPhone" required placeholder="Phone Number / ফোন নম্বর" class="w-full bg-gray-50 border border-gray-200 rounded-2xl px-4 py-3 text-sm outline-none focus:border-green-600 transition">
                    <textarea id="cusAddress" required placeholder="Full Delivery Address / ডেলিভারি ঠিকানা" class="w-full bg-gray-50 border border-gray-200 rounded-2xl px-4 py-3 text-sm outline-none focus:border-green-600 transition min-h-[90px]"></textarea>
                    
                    <button type="submit" class="w-full bg-green-600 text-white font-bold py-4 rounded-2xl shadow-xl shadow-green-900/30 hover:bg-green-700 transition-all flex items-center justify-center gap-3 active:scale-95">
                        <i class="fab fa-whatsapp text-xl"></i>
                        Confirm via WhatsApp
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAkLS6VAGLk0z5K5LaHBlUWKf8HRmRZ3jc",
            authDomain: "souvik-saha.firebaseapp.com",
            databaseURL: "https://souvik-saha-default-rtdb.firebaseio.com",
            projectId: "souvik-saha",
            storageBucket: "souvik-saha.firebasestorage.app",
            messagingSenderId: "883171907186",
            appId: "1:883171907186:web:dda3ce4ced5ba6a37d54eb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        window.allProducts = [];

        onValue(ref(db, 'products'), (snap) => {
            const data = snap.val();
            const loading = document.getElementById('loading');
            
            if (data) {
                window.allProducts = Object.keys(data).map(key => ({ id: key, ...data[key] })).reverse();
                renderProducts('all');
                if (loading) loading.classList.add('hidden');
            } else {
                document.getElementById('productGrid').innerHTML = '<p class="col-span-full text-center py-20 text-gray-400 italic">No products available at the moment.</p>';
                if (loading) loading.classList.add('hidden');
            }
        });

        window.renderProducts = (cat) => {
            const grid = document.getElementById('productGrid');
            let htmlBuffer = '';
            
            const filtered = window.allProducts.filter(p => {
                if (cat === 'all') return true;
                return p.category && p.category.toLowerCase() === cat.toLowerCase();
            });

            filtered.forEach(p => {
                const isOut = p.status === 'out';
                htmlBuffer += `
                    <div class="bg-white rounded-[2.5rem] shadow-sm border border-gray-100 overflow-hidden flex flex-col relative group transition-all hover:shadow-2xl duration-500">
                        <div class="relative aspect-[4/5] bg-gray-100 overflow-hidden">
                            ${isOut ? `<div class="absolute inset-0 z-10 out-of-stock-overlay flex items-center justify-center"><span class="bg-red-600 text-white text-[10px] font-bold px-4 py-1.5 rounded-full uppercase tracking-widest shadow-lg">Not in Stock</span></div>` : ''}
                            <img src="${p.image}" loading="lazy" class="absolute inset-0 w-full h-full object-cover transition-transform duration-1000 ${isOut ? 'grayscale scale-105' : 'group-hover:scale-110'}">
                        </div>
                        <div class="p-5 md:p-6 flex flex-col flex-grow">
                            <h4 class="font-bold text-gray-800 text-sm mb-3 line-clamp-1 group-hover:text-green-600 transition-colors">${p.name}</h4>
                            <div class="mt-auto flex justify-between items-center">
                                <span class="text-green-600 font-bold text-xl">₹${p.price}</span>
                                <button ${isOut ? 'disabled' : `onclick="openModal('${p.id}')"`} class="w-11 h-11 rounded-2xl bg-gray-900 text-white flex items-center justify-center transition-all shadow-xl shadow-gray-400/20 hover:bg-green-600 active:scale-90">
                                    <i class="fas ${isOut ? 'fa-ban' : 'fa-shopping-cart'} text-sm"></i>
                                </button>
                            </div>
                        </div>
                    </div>`;
            });
            grid.innerHTML = htmlBuffer;
        };

        window.filterProducts = (cat) => {
            document.querySelectorAll('.cat-btn').forEach(b => {
                b.classList.remove('bg-gray-900', 'text-white', 'shadow-md');
                b.classList.add('text-gray-500');
            });
            event.currentTarget.classList.add('bg-gray-900', 'text-white', 'shadow-md');
            event.currentTarget.classList.remove('text-gray-500');
            renderProducts(cat);
        };

        let currentP = null;
        window.openModal = (id) => {
            currentP = window.allProducts.find(x => x.id === id);
            document.getElementById('modalPName').innerText = currentP.name;
            document.getElementById('modalPPrice').innerText = `₹${currentP.price}`;
            document.getElementById('modalImg').src = currentP.image;
            document.getElementById('orderModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        };

        window.closeModal = () => {
            document.getElementById('orderModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        };

        window.submitOrder = (e) => {
            e.preventDefault();
            const waMsg = `🛍️ *NEW ORDER - FASHION HUB 2026*\n` +
                        `👕 *Product:* ${currentP.name}\n` +
                        `💰 *Price:* ₹${currentP.price}\n` +
                        `📏 *Size:* ${document.getElementById('cusSize').value}\n` +
                        `🎨 *Color:* ${document.getElementById('cusColor').value || 'Default'}\n\n` +
                        `👤 *Customer:* ${document.getElementById('cusName').value}\n` +
                        `📞 *Phone:* ${document.getElementById('cusPhone').value}\n` +
                        `📍 *Address:* ${document.getElementById('cusAddress').value}`;
            window.open(`https://wa.me/916291767175?text=${encodeURIComponent(waMsg)}`, '_blank');
        };
    </script>
</body>
</html>
